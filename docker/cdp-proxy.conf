# nginx config for the cdp-proxy service.
#
# Why this exists:
#   Chrome's --remote-debugging-port hardens its DevTools endpoint by
#   rejecting any HTTP request whose Host header is not 127.0.0.1,
#   localhost, or an IP literal. (See chromium/RemoteDebuggingPipe and
#   the "Host header is specified and is not an IP address or
#   localhost" check.)
#
#   When the app container hits http://host.docker.internal:9222 the
#   Host header it sends is "host.docker.internal:9222" — Chrome
#   answers 500 and the websocket handshake never starts.
#
#   This proxy sits inside the docker network on port 9333. The app
#   container points CHROME_CDP_URL at it; the proxy rewrites the Host
#   header to "127.0.0.1:9222" before forwarding to the real Chrome on
#   the Windows host (still over host.docker.internal). Chrome is
#   happy with that header, so /json/version and the websocket upgrade
#   both succeed.
#
#   The sub_filter rewrites the `webSocketDebuggerUrl` strings Chrome
#   returns from `/json/version` and `/json` so Playwright connects
#   back to the proxy (ws://cdp-proxy:9333/...) instead of trying to
#   reach ws://localhost:9222 from inside the container.

server {
    listen 9333;

    location / {
        proxy_pass http://host.docker.internal:9222;
        proxy_http_version 1.1;

        # Make Chrome think this request came from the host loopback.
        proxy_set_header Host 127.0.0.1:9222;
        proxy_set_header Origin http://127.0.0.1:9222;

        # Websocket upgrade plumbing — the CDP session is a ws after
        # the initial /json/version fetch.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # CDP sessions are long-lived; raise the timeouts so nginx
        # doesn't kill them mid-generation.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Rewrite the websocket URLs Chrome embeds in /json responses
        # so Playwright connects to the proxy, not to a localhost the
        # container can't reach.
        sub_filter_once off;
        sub_filter_types application/json text/plain;
        sub_filter "ws://127.0.0.1:9222" "ws://cdp-proxy:9333";
        sub_filter "ws://localhost:9222" "ws://cdp-proxy:9333";
    }
}
